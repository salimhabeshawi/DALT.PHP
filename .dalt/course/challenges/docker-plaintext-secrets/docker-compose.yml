services:
  app:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      # BUG: Plaintext password in compose file
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: dalt

volumes:
  pgdata:
