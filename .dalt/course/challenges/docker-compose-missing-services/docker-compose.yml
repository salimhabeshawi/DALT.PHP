services:
  app:
    build: .
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    # Once you add the database service below, configure the app to start after it.

  # Add the database service here.
  # Use the official Postgres 16 image on Alpine Linux.
  # Load credentials via env_file and persist data with the named volume declared below.

  # Add the web server service here.
  # Use the official Nginx image on Alpine Linux.
  # Mount the nginx config from ./nginx/default.conf into the container.
  # Expose the container's HTTP port to your host machine (see the lesson for the port number).

volumes:
  pgdata:
